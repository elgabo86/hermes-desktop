name: Build AppImage

on:
  schedule:
    - cron: '0 6 * * *'  # tous les jours à 06:00 UTC
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref (branch, tag, commit)'
        default: 'main'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh "${{ inputs.upstream_ref || 'main' }}"

      - name: Install build dependencies (zsync + squashfs-tools)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zsync squashfs-tools

      - name: Get version
        id: version
        run: |
          VERSION=$(basename dist/hermes-desktop-*.AppImage | sed 's/hermes-desktop-\(.*\)-x86_64.*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Delete existing tag (if any)
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Hermes Desktop ${{ steps.version.outputs.version }}"
          files: |
            dist/hermes-desktop-*.AppImage
            dist/hermes-desktop-*.AppImage.zsync
          fail_on_unmatched_files: true
