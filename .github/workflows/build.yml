name: Build AppImage

on:
  schedule:
    - cron: '0 6 * * *'  # tous les jours à 06:00 UTC
  workflow_dispatch:
    inputs:
      i18n_branch:
        description: 'i18n fork branch'
        default: 'i18n/french-desktop'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh "${{ inputs.i18n_branch || 'i18n/french-desktop' }}"

      - name: Install build dependencies (zsync + squashfs-tools)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zsync squashfs-tools

      - name: Generate zsync
        run: |
          APPIMAGE=$(ls dist/hermes-desktop-*.AppImage | head -1)
          BASENAME=$(basename "$APPIMAGE")
          zsyncmake -u "https://github.com/elgabo86/hermes-desktop/releases/download/latest/${BASENAME}" \
            -o "dist/${BASENAME}.zsync" "$APPIMAGE"

      - name: Update VERSION file
        run: |
          date -u +%Y%m%dT%H%M%SZ > dist/VERSION
          ls dist/hermes-desktop-*.AppImage | head -1 | xargs basename > dist/LATEST

      - name: Delete existing latest release (if any)
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Hermes Desktop
          files: |
            dist/hermes-desktop-*.AppImage
            dist/hermes-desktop-*.AppImage.zsync
            dist/VERSION
            dist/LATEST
          fail_on_unmatched_files: true
